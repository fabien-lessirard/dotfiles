name: Local Config
version: 1.0.0
schema: v1

models:
  # --- Tes modèles Cloud (Identiques) ---
  - uses: anthropic/claude-3.5-sonnet
    with:
      OPENROUTER_API_KEY: sk-or-v1-YOUR_OPENROUTER_KEY_HERE
  - uses: google/gemini-2.5-pro
    with:
      GEMINI_API_KEY: geminiApiKey
  - uses: google/gemini-2.0-flash
    with:
      GEMINI_API_KEY: geminiApiKey

  # --- Tes nouveaux modèles Locaux (Via host.docker.internal) ---
  - name: "Llama 3.2 3B (Local Chat)"
    provider: ollama
    model: llama3.2:3b
    apiBase: http://host.docker.internal:11434
  - name: "Qwen 2.5 Coder 3B (Local Code)"
    provider: ollama
    model: qwen2.5-coder:3b
    apiBase: http://host.docker.internal:11434

tabAutocompleteModel:
  name: "Qwen 2.5 Coder 1.5B (Fast Local)"
  provider: ollama
  model: qwen2.5-coder:1.5b
  apiBase: http://host.docker.internal:11434

embeddingsProvider:
  provider: ollama
  model: nomic-embed-text
  apiBase: http://host.docker.internal:11434

contextLength: 4096