name: Local Config
version: 1.0.0
schema: v1
models:
  - uses: google/gemini-2.5-pro
    with:
      GEMINI_API_KEY: ${VITE_GEMINI_API_KEY}

  - name: "Qwen 2.5 Coder 7B (Ollama Windows)"
    provider: "ollama"
    model: "qwen2.5-coder:7b"
    apiBase: "http://host.docker.internal:11434"

  - name: "Llama 3 (Ollama Windows)"
    provider: "ollama"
    model: "llama3"
    apiBase: "http://host.docker.internal:11434"
    contextLength: 2048

  - name: "Claude 3.5 Sonnet (Pro)"
    provider: "anthropic"
    model: "claude-3-5-sonnet-20240620"

tabAutocompleteModel:
  disabled: true

embeddingsProvider:
  provider: "google-generative-ai"
  model: "text-embedding-004"
  apiKey: ${VITE_GEMINI_API_KEY}
