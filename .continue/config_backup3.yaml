# --- LE TRIO GOOGLE (Survie & Performance) ---
  - name: "Gemini 3 Flash (Routine - Rapide & Illimité)"
    provider: "google-generative-ai"
    model: "gemini-3-flash"
    apiKey: "geminiApiKey"
    description: "Ton compagnon par défaut. Idéal pour le code de routine et les explications."

  - name: "Gemini 2.5 Pro (Expert Stable)"
    provider: "google-generative-ai"
    model: "gemini-2.5-pro-latest"
    apiKey: "geminiApiKey"
    description: "À utiliser pour l'architecture et les fonctions Firebase complexes."

  - name: "Gemini 3.0 Preview (Cerveau Expérimental)"
    provider: "google-generative-ai"
    model: "gemini-3.0-preview-001"
    apiKey: "geminiApiKey"
    description: "Le dernier recours pour les bugs que personne n'arrive à résoudre."

